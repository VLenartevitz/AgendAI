name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Format check
        run: dotnet format AgendAI.sln --verify-no-changes --severity warn

      - name: Restore
        run: dotnet restore AgendAI.sln

      - name: Build
        run: dotnet build AgendAI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AgendAI.sln --configuration Release --no-build
